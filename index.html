<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python游戏化学习</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Python游戏化学习</h1>
            <p class="subtitle">以游戏的方式循序渐进学习Python编程</p>
        </div>
    </header>
    
    <nav>
        <div class="container nav-container">
            <div class="logo">Python Game Learn</div>
            <ul class="nav-links">
                <li><a href="#">首页</a></li>
                <li><a href="#">关卡</a></li>
                <li><a href="#">关于</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText">完成进度: 0%</p>
        
        <div class="game-container">
            <h2>选择关卡</h2>
            <div class="level-selector" id="levelSelector">
                <!-- 关卡按钮将通过JavaScript动态生成 -->
            </div>
            
            <div id="levelContent">
                <!-- 关卡内容将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 Python游戏化学习平台. 保留所有权利.</p>
        </div>
    </footer>
    
    <script src="js/game.js"></script>
</body>
</html>
